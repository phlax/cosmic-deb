services:
  build-cosmic:
    build:
      context: .
      args:
        BUILDER_UID: ${HOST_UID:-1000}
        BUILDER_GID: ${HOST_GID:-1000}
    environment:
      COSMIC_PACKAGES: ${COSMIC_PACKAGES:-}
      PACKAGES_FILE: ${PACKAGES_FILE:-/workspace/packages.txt}
      WORK_DIR: ${WORK_DIR:-/work}
      CACHE_DIR: ${CACHE_DIR:-/cache}
      OUT_DIR: ${OUT_DIR:-/out}
    volumes:
      - ./:/workspace
      - ./out:/out
      - ./cache:/cache
      - ./work:/work
    working_dir: /workspace
    command: ["/workspace/scripts/build-cosmic-deb.sh"]
